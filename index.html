<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shajra Excel Pro - Menu Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #eef2f5;
        }
        .hide-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .hide-scrollbar::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        
        .excel-cell {
            width: 160px;
            height: 80px;
            border: 1px solid #2c3e2f;
            background-color: #fffcf5;
            position: relative;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.05s linear;
            z-index: 10;
        }
        
        .excel-cell.has-data {
            border: 3.5px solid #1e3a2f !important;
        }
        
        .text-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            text-align: center;
            z-index: 30;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            pointer-events: none;
        }
        .text-content strong { font-size: 13px; font-weight: 800; margin-bottom: 2px; color: #0a2f1f; }
        .text-content span { font-size: 11px; color: #2d3e2b; font-weight: 600; }
        
        .excel-row-header {
            border-bottom: 1px solid #2c3e2f;
            padding: 10px 8px;
            min-height: 44px;
            outline: none;
            background: #fef9e6;
            font-weight: 500;
        }
        .excel-row-header:last-child { border-bottom: 2px solid #2c3e2f; }
        
        /* ---------------- PRINT STYLES ---------------- */
        @media print {
            @page { size: A4 landscape; margin: 5mm; } /* मार्जिन कम किया गया ताकि ज़्यादा जगह मिले */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .print\:hidden { display: none !important; }
            body, html {
                background: white !important; margin: 0 !important; padding: 0 !important;
                height: auto !important; overflow: visible !important;
            }
            .flex-1.overflow-auto, .hide-scrollbar {
                overflow: visible !important; height: auto !important; padding: 0 !important; background: white !important;
            }
            #canvas-wrapper { transform: none !important; position: static !important; width: 100% !important; height: auto !important; }
            #pages-wrapper { display: block !important; gap: 0 !important; }
            .page-container {
                display: block !important; page-break-inside: avoid !important; break-inside: avoid !important;
                page-break-after: always !important; break-after: page !important;
                border: 2px solid #000 !important; margin: 0 0 10px 0 !important; padding: 20px !important;
                background: white !important; box-shadow: none !important; 
                zoom: 0.55 !important; /* जूम कम किया ताकि सब कुछ एक पेज पर अच्छे से आ जाए */
            }
            .page-container:last-child { page-break-after: auto !important; break-after: auto !important; margin-bottom: 0 !important; }
            @-moz-document url-prefix() {
                .page-container {
                    transform: scale(0.55) !important; transform-origin: top left !important;
                    width: 1580px !important; height: 1250px !important; margin-bottom: -500px !important; 
                }
            }
            svg { overflow: visible !important; }
        }
        /* ---------------------------------------------- */

        .excel-cell.selected-cell { outline: 3px solid #2c7da0; outline-offset: 1px; z-index: 40; }
        .excel-cell.link-start-highlight { outline: 3px solid #e67e22; outline-offset: 1px; z-index: 40; }
        .excel-cell.delete-mode-highlight { outline: 3px solid #ef4444; outline-offset: 1px; z-index: 40; }
        
        .symbol-bg { pointer-events: none; z-index: 25; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 1. TOP MENU BAR (System Level) -->
    <div class="print:hidden w-full bg-[#1e293b] text-gray-200 flex items-center px-4 py-1.5 text-sm z-[60] shadow-md relative shrink-0">
        <div class="font-extrabold text-white mr-6 tracking-wide text-lg">शजरा प्रो</div>
        
        <!-- Menu Items -->
        <div class="flex items-center gap-1">
            <!-- File Menu Dropdown -->
            <div class="relative group">
                <button class="px-3 py-1.5 rounded hover:bg-slate-700 transition font-medium flex items-center gap-1">
                    फ़ाइल (File)
                    <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <!-- Dropdown Content -->
                <div class="absolute left-0 top-full mt-0 w-48 bg-white text-gray-800 border border-gray-300 shadow-xl rounded-b-md hidden group-hover:block z-[100] py-1">
                    <button onclick="document.getElementById('file-input').click()" class="w-full text-left px-4 py-2 hover:bg-slate-100 flex justify-between items-center transition">
                        <span>आयात (Import)</span><span class="text-[10px] text-slate-400 font-mono bg-slate-100 px-1 rounded">.json</span>
                    </button>
                    <button onclick="handleExport()" class="w-full text-left px-4 py-2 hover:bg-slate-100 flex justify-between items-center transition">
                        <span>निर्यात (Export)</span><span class="text-[10px] text-slate-400 font-mono bg-slate-100 px-1 rounded">.json</span>
                    </button>
                    <div class="border-t border-gray-200 my-1"></div>
                    <button onclick="window.print()" class="w-full text-left px-4 py-2 hover:bg-emerald-50 text-emerald-700 font-bold flex justify-between items-center transition">
                        <span>प्रिंट (Print)</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    </button>
                </div>
            </div>
            
            <div class="px-3 py-1.5 rounded hover:bg-slate-700 transition font-medium cursor-help" title="शॉर्टकट: नाम लिखकर Enter दबाएं।">मदद (Help)</div>
        </div>

        <!-- Zoom Control -->
        <div class="ml-auto flex items-center gap-3">
            <span class="text-xs font-medium text-slate-300">ज़ूम:</span>
            <input type="range" id="zoom-slider" min="0.4" max="1.5" step="0.1" value="1" oninput="handleZoom(this.value)" class="w-24 cursor-pointer accent-emerald-500">
        </div>
    </div>

    <!-- Hidden File Input for Import -->
    <input type="file" id="file-input" onchange="handleImport(event)" class="hidden" accept=".json">

    <!-- 2. MAIN TOOLBAR (Tabs & Tools) -->
    <div class="print:hidden w-full bg-white border-b border-gray-300 z-50 p-2 shadow-sm flex flex-col gap-2 shrink-0">
        <div class="flex flex-wrap items-center justify-between gap-3">
            
            <!-- Tabs Area -->
            <div class="flex gap-1 overflow-x-auto hide-scrollbar pb-1 sm:pb-0" id="tabs-container"></div>
            
            <!-- Tools Area -->
            <div class="flex flex-wrap items-center gap-2">
                <div id="mic-container" class="flex items-center justify-center gap-1.5 px-2 py-1.5 border border-slate-300 bg-slate-50 hover:bg-slate-100 rounded cursor-pointer transition shrink-0" title="बॉक्स चुनें और बोलें">
                    <svg id="mic-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-600">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span id="mic-text" class="text-xs font-bold text-slate-600 hidden sm:inline">बोलें</span>
                </div>

                <textarea id="manual-name" rows="1" class="w-40 sm:w-56 border border-slate-400 px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded bg-white resize-none leading-tight" placeholder="नाम लिखें (Enter से सेव)" style="height: 32px;"></textarea>
                
                <button onclick="handleManualEntry()" class="bg-blue-600 text-white px-3 py-1.5 text-xs font-bold hover:bg-blue-700 transition rounded shadow-sm">सेव</button>
                
                <div class="w-px h-6 bg-slate-300 mx-0.5"></div>
                
                <button onclick="setEntryType('male')" class="bg-white border border-slate-400 px-2.5 py-1.5 text-xs font-bold text-slate-800 hover:bg-slate-100 transition rounded">पुरुष</button>
                <button onclick="setEntryType('female')" class="bg-white border border-slate-400 px-2.5 py-1.5 text-xs font-bold text-pink-600 hover:bg-pink-50 transition rounded">बेटी (△)</button>
                <button onclick="setEntryType('wife')" class="bg-white border border-slate-400 px-2.5 py-1.5 text-xs font-bold text-rose-700 hover:bg-rose-50 transition rounded">पत्नी (♡)</button>
                
                <div class="w-px h-6 bg-slate-300 mx-0.5"></div>
                
                <button id="btn-link-mode" onclick="toggleLinkMode()" class="bg-slate-800 text-white px-3 py-1.5 text-xs font-bold hover:bg-black transition rounded">लाइन जोड़ें</button>
                <button id="btn-delete-link-mode" onclick="toggleDeleteLinkMode()" class="bg-white border border-red-400 text-red-600 px-3 py-1.5 text-xs font-bold hover:bg-red-50 transition rounded">लाइन हटाएं</button>
                <button onclick="deleteSelectedCell()" class="bg-red-50 text-red-700 border border-red-300 px-3 py-1.5 text-xs font-bold hover:bg-red-100 transition rounded" title="चुना हुआ बॉक्स मिटाएं">मिटाएं</button>
            </div>
        </div>
    </div>

    <div class="flex-1 w-full overflow-auto bg-gray-100 p-4 hide-scrollbar relative">
        <div id="canvas-wrapper" class="origin-top-left inline-block transition-transform duration-100">
            <div id="pages-wrapper" class="flex flex-col gap-8"></div>
        </div>
    </div>

    <script>
        const COL_W = 160, ROW_H = 80, GAP_X = 40, GAP_Y = 60, COLS = 7, ROWS = 7;
        const WIFE_LEFT_EDGE = 25, WIFE_RIGHT_EDGE = 150;   
        
        let state = {
            pages: {},
            activePage: "page-0",
            links: [],
            selectedPos: '0-0',
            isLinkMode: false,
            isDeleteLinkMode: false,
            linkStart: null,
            isListening: false
        };

        window.onload = () => {
            addPage("page-0");
            document.getElementById('manual-name').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleManualEntry(); }
            });
            renderTabs();
            updateSelectionUI();
        };

        function handleZoom(val) { document.getElementById('canvas-wrapper').style.transform = `scale(${val})`; }

        function addPage(pId) {
            if (!state.pages[pId]) state.pages[pId] = {};
            const wrapper = document.getElementById('pages-wrapper');
            const pageDiv = document.createElement('div');
            pageDiv.id = pId;
            pageDiv.className = "page-container bg-white shadow-xl border border-gray-400 p-10 min-w-[1580px] min-h-[1020px] rounded-sm";
            
            pageDiv.innerHTML = `
                <div class="mb-8 w-full border-t-2 border-x-2 border-black z-20 relative bg-[#fef7e0]">
                    <div contenteditable="true" class="excel-row-header text-center text-xl font-bold tracking-wide">शजरा नस्ब मालकान &nbsp;&nbsp;&nbsp; मौजा - ________ &nbsp;&nbsp;&nbsp; ह.नं. ______ &nbsp;&nbsp;&nbsp; तहसील - बावल &nbsp;&nbsp;&nbsp; जिला - ________ &nbsp;&nbsp;&nbsp; बाबत साल - ______</div>
                    <div contenteditable="true" class="excel-row-header text-center text-md text-gray-700">(वंशावली मुख्य पंक्ति - खानदानी रिकॉर्ड)</div>
                    <div contenteditable="true" class="excel-row-header text-center text-md text-gray-700">(महत्वपूर्ण टिप्पणी / संदर्भ)</div>
                </div>
                <!-- Flex wrapper added here to center the grid horizontally perfectly -->
                <div class="flex justify-center w-full my-8">
                    <div id="grid-container-${pId}" class="relative inline-block text-left">
                        <svg id="svg-${pId}" class="absolute inset-0 w-full h-full pointer-events-none overflow-visible" style="z-index: 5;"></svg>
                        <div id="grid-${pId}" class="grid grid-cols-7 gap-x-[40px] gap-y-[60px] relative z-10"></div>
                    </div>
                </div>
                <div class="mt-12 w-full border-t-2 border-x-2 border-black z-20 relative bg-[#fef7e0]">
                    <div contenteditable="true" class="excel-row-header text-right font-bold text-md">प्रमाण / विवरण पंक्ति १</div>
                    <div contenteditable="true" class="excel-row-header text-right font-bold text-md">विवरण पंक्ति २ (मुहर / हस्ताक्षर)</div>
                </div>
            `;
            wrapper.appendChild(pageDiv);
            const grid = document.getElementById(`grid-${pId}`);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const pos = `${r}-${c}`;
                    const cellDiv = document.createElement('div');
                    cellDiv.id = `cell-${pId}-${pos}`;
                    cellDiv.className = "excel-cell";
                    cellDiv.onclick = () => handleCellClick(pId, r, c);
                    grid.appendChild(cellDiv);
                }
            }
            switchPage(pId);
        }

        function switchPage(pId) {
            state.activePage = pId;
            document.querySelectorAll('.page-container').forEach(p => p.style.display = (p.id === pId ? "block" : "none"));
            renderTabs();
            updateSelectionUI();
            calculateLines();
        }

        function renderCell(pId, pos) {
            const cell = document.getElementById(`cell-${pId}-${pos}`);
            const data = state.pages[pId][pos];
            if (!cell) return;
            cell.innerHTML = '';
            const hasContent = data && data.name && data.name.trim().length > 0;
            if (hasContent) cell.classList.add('has-data');
            else cell.classList.remove('has-data');
            
            if (data && (data.type === 'wife' || data.type === 'female')) cell.style.backgroundColor = 'transparent';
            else if (hasContent) cell.style.backgroundColor = '#fffef7';
            else cell.style.backgroundColor = '#fffcf5';
            
            if (!data) return;
            const lines = data.name.split('\n');
            const textHtml = `<strong>${escapeHtml(lines[0])}</strong>${lines.slice(1).map(l => `<span>${escapeHtml(l)}</span>`).join('')}`;
            
            if (data.type === 'female') {
                cell.insertAdjacentHTML('beforeend', `<svg class="absolute inset-0 w-full h-full symbol-bg" viewBox="0 0 160 80"><polygon points="80,0 70,15 90,15" fill="white" stroke="#1e3a2f" stroke-width="1.8"/></svg>`);
                cell.insertAdjacentHTML('beforeend', `<div class="text-content absolute inset-0 pt-[14px]">${textHtml}</div>`);
            } else if (data.type === 'wife') {
                cell.insertAdjacentHTML('beforeend', `<svg class="absolute inset-0 w-full h-full symbol-bg" viewBox="0 0 160 80"><path d="M 25 40 C 5 -5, 80 -5, 150 40 C 80 85, 5 85, 25 40 Z" fill="#fff4f0" stroke="#7a2e2e" stroke-width="2"/></svg>`);
                cell.insertAdjacentHTML('beforeend', `<div class="text-content absolute inset-0" style="padding-left: 32px; padding-right: 15px;">${textHtml}</div>`);
            } else {
                cell.insertAdjacentHTML('beforeend', `<div class="text-content absolute inset-0">${textHtml}</div>`);
            }
        }
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        function getCoords(pos) {
            const [r, c] = pos.split('-').map(Number);
            const x = c * (COL_W + GAP_X), y = r * (ROW_H + GAP_Y);
            return { x, y, cx: x + 80, cy: y + 40, top: y, bottom: y + ROW_H, right: x + COL_W, left: x };
        }

        function calculateLines() {
            Object.keys(state.pages).forEach(p => { const s = document.getElementById(`svg-${p}`); if (s) s.innerHTML = ''; });
            const totalGridWidth = (COLS * COL_W) + ((COLS-1) * GAP_X);
            
            state.links.forEach(link => {
                const fP = link.from.page, tP = link.to.page, fPo = link.from.pos, tPo = link.to.pos;
                const fD = state.pages[fP]?.[fPo], tD = state.pages[tP]?.[tPo];
                const c1 = getCoords(fPo), c2 = getCoords(tPo);
                const isSameRow = Math.abs(c1.y - c2.y) < 10;

                if (isSameRow) {
                    if (fP === tP) {
                        const svg = document.getElementById(`svg-${fP}`); if (!svg) return;
                        let sX = c1.cx < c2.cx ? c1.right : c2.right;
                        let eX = c1.cx < c2.cx ? c2.left : c1.left;
                        const lD = c1.cx < c2.cx ? fD : tD, rD = c1.cx < c2.cx ? tD : fD;
                        if (rD?.type === 'wife') eX += WIFE_LEFT_EDGE;
                        if (lD?.type === 'wife') sX = (c1.cx < c2.cx ? c1.left : c2.left) + WIFE_RIGHT_EDGE;
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M ${sX} ${c1.cy} L ${eX} ${c1.cy}`);
                        path.setAttribute('stroke', '#1e293b'); path.setAttribute('stroke-width', '2.5'); path.setAttribute('fill', 'none');
                        svg.appendChild(path);
                    } else {
                        const sF = document.getElementById(`svg-${fP}`), sT = document.getElementById(`svg-${tP}`);
                        if (sF) {
                            let sX = fD?.type === 'wife' ? c1.left + WIFE_RIGHT_EDGE : c1.right;
                            const p1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            p1.setAttribute('d', `M ${sX} ${c1.cy} L ${totalGridWidth + 50} ${c1.cy}`);
                            p1.setAttribute('stroke', '#1e293b'); p1.setAttribute('stroke-width', '2.5'); sF.appendChild(p1);
                        }
                        if (sT) {
                            let eX = tD?.type === 'wife' ? c2.left + WIFE_LEFT_EDGE : c2.left;
                            const p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            p2.setAttribute('d', `M -40 ${c2.cy} L ${eX} ${c2.cy}`);
                            p2.setAttribute('stroke', '#1e293b'); p2.setAttribute('stroke-width', '2.5'); sT.appendChild(p2);
                        }
                    }
                } else {
                    const mY = c1.bottom + (GAP_Y / 2), sF = document.getElementById(`svg-${fP}`);
                    if (sF) {
                        let d1 = `M ${c1.cx} ${c1.bottom} L ${c1.cx} ${mY}`;
                        d1 += (fP === tP) ? ` L ${c2.cx} ${mY} L ${c2.cx} ${c2.top}` : ` L ${totalGridWidth + 50} ${mY}`;
                        const p1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        p1.setAttribute('d', d1); p1.setAttribute('stroke', '#1e293b'); p1.setAttribute('stroke-width', '2'); p1.setAttribute('fill', 'none');
                        sF.appendChild(p1);
                    }
                    if (fP !== tP) {
                        const sT = document.getElementById(`svg-${tP}`);
                        if (sT) {
                            const p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            p2.setAttribute('d', `M -40 ${mY} L ${c2.cx} ${mY} L ${c2.cx} ${c2.top}`);
                            p2.setAttribute('stroke', '#1e293b'); p2.setAttribute('stroke-width', '2'); p2.setAttribute('fill', 'none');
                            sT.appendChild(p2);
                        }
                    }
                }
            });
        }

        function handleCellClick(pId, r, c) {
            const pos = `${r}-${c}`;
            if (state.isDeleteLinkMode) {
                state.links = state.links.filter(l => 
                    !(l.from.page === pId && l.from.pos === pos) && 
                    !(l.to.page === pId && l.to.pos === pos)
                );
                calculateLines();
                return;
            }
            if (state.isLinkMode) {
                if (!state.linkStart) { state.linkStart = { page: pId, pos: pos }; updateSelectionUI(); }
                else {
                    if (state.linkStart.page === pId && state.linkStart.pos === pos) { state.linkStart = null; updateSelectionUI(); return; }
                    state.links.push({ from: state.linkStart, to: { page: pId, pos: pos } });
                    state.linkStart = null; calculateLines(); updateSelectionUI();
                }
            } else {
                state.selectedPos = pos;
                if (state.activePage !== pId) switchPage(pId);
                const data = state.pages[pId][pos];
                document.getElementById('manual-name').value = data ? data.name : '';
                if (!data || !data.name) triggerVoiceForCell(pId, pos);
                updateSelectionUI();
            }
        }
        
        function triggerVoiceForCell(pId, pos) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            const rec = new SR(); rec.lang = 'hi-IN'; state.isListening = true; updateListeningUI();
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                state.pages[pId][pos] = { ...(state.pages[pId][pos] || {type:'male'}), name: text };
                document.getElementById('manual-name').value = text;
                renderCell(pId, pos); calculateLines();
            };
            rec.onend = () => { state.isListening = false; updateListeningUI(); };
            rec.start();
        }
        
        function updateListeningUI() {
            const c = document.getElementById('mic-container'), t = document.getElementById('mic-text');
            if (state.isListening) { c.className = "flex items-center gap-1.5 px-2 py-1.5 border border-red-400 bg-red-100 rounded shrink-0"; t.textContent = 'सुन रहा हूँ...'; t.className="text-xs font-bold text-red-700 hidden sm:inline"; }
            else { c.className = "flex items-center gap-1.5 px-2 py-1.5 border border-slate-300 bg-slate-50 hover:bg-slate-100 rounded cursor-pointer transition shrink-0"; t.textContent = 'बोलें'; t.className="text-xs font-bold text-slate-600 hidden sm:inline"; }
        }
        
        function updateSelectionUI() {
            document.querySelectorAll('.excel-cell').forEach(el => el.classList.remove('selected-cell', 'link-start-highlight', 'delete-mode-highlight'));
            const sel = document.getElementById(`cell-${state.activePage}-${state.selectedPos}`);
            if (sel) sel.classList.add(state.isDeleteLinkMode ? 'delete-mode-highlight' : 'selected-cell');
            if (state.linkStart) {
                const start = document.getElementById(`cell-${state.linkStart.page}-${state.linkStart.pos}`);
                if (start) start.classList.add('link-start-highlight');
            }
        }
        
        function handleManualEntry() {
            const name = document.getElementById('manual-name').value.trim();
            if (!name) return;
            state.pages[state.activePage][state.selectedPos] = { ...(state.pages[state.activePage][state.selectedPos] || {type:'male'}), name: name };
            renderCell(state.activePage, state.selectedPos); calculateLines();
        }
        
        function setEntryType(t) {
            state.pages[state.activePage][state.selectedPos] = { ...(state.pages[state.activePage][state.selectedPos] || {name:''}), type: t };
            renderCell(state.activePage, state.selectedPos); calculateLines();
        }
        
        function toggleLinkMode() {
            state.isLinkMode = !state.isLinkMode; state.isDeleteLinkMode = false; state.linkStart = null;
            const btn = document.getElementById('btn-link-mode'), btnD = document.getElementById('btn-delete-link-mode');
            btn.className = state.isLinkMode ? "bg-orange-600 text-white px-3 py-1.5 text-xs font-bold rounded shadow transition" : "bg-slate-800 text-white px-3 py-1.5 text-xs font-bold hover:bg-black rounded transition";
            btnD.className = "bg-white border border-red-400 text-red-600 px-3 py-1.5 text-xs font-bold hover:bg-red-50 rounded transition";
            updateSelectionUI();
        }

        function toggleDeleteLinkMode() {
            state.isDeleteLinkMode = !state.isDeleteLinkMode; state.isLinkMode = false; state.linkStart = null;
            const btn = document.getElementById('btn-link-mode'), btnD = document.getElementById('btn-delete-link-mode');
            btnD.className = state.isDeleteLinkMode ? "bg-red-600 text-white px-3 py-1.5 text-xs font-bold rounded shadow transition" : "bg-white border border-red-400 text-red-600 px-3 py-1.5 text-xs font-bold hover:bg-red-50 rounded transition";
            btn.className = "bg-slate-800 text-white px-3 py-1.5 text-xs font-bold hover:bg-black rounded transition";
            updateSelectionUI();
        }
        
        function deleteSelectedCell() {
            delete state.pages[state.activePage][state.selectedPos];
            state.links = state.links.filter(l => !(l.from.page === state.activePage && l.from.pos === state.selectedPos) && !(l.to.page === state.activePage && l.to.pos === state.selectedPos));
            renderCell(state.activePage, state.selectedPos); calculateLines(); document.getElementById('manual-name').value = '';
        }
        
        function renderTabs() {
            const container = document.getElementById('tabs-container'); container.innerHTML = '';
            Object.keys(state.pages).forEach((p, idx) => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1.5 border text-xs font-bold rounded transition ${state.activePage === p ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'}`;
                btn.textContent = `पेज ${idx+1}`; btn.onclick = () => switchPage(p); container.appendChild(btn);
            });
            const addBtn = document.createElement('button'); addBtn.textContent = "+ नया पेज"; addBtn.className = "px-3 py-1.5 border border-emerald-400 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 text-xs font-bold rounded transition";
            addBtn.onclick = () => addPage(`page-${Object.keys(state.pages).length}`); container.appendChild(addBtn);
        }
        
        function handleExport() {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(state)], {type:'application/json'}));
            a.download = 'Shajra_Pro_Data.json'; a.click();
        }
        
        function handleImport(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = (ev) => {
                try {
                    state = JSON.parse(ev.target.result); document.getElementById('pages-wrapper').innerHTML = '';
                    Object.keys(state.pages).forEach(p => { addPage(p); Object.keys(state.pages[p]).forEach(pos => renderCell(p, pos)); });
                    if (Object.keys(state.pages).length) switchPage(Object.keys(state.pages)[0]);
                    calculateLines();
                } catch(err) { alert("अमान्य फ़ाइल"); }
            }; reader.readAsText(file); e.target.value = '';
        }
    </script>
</body>
</html>
