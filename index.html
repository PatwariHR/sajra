<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shajra Excel Pro - Menu Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Default Global Styling Variables */
            --global-fs: 13px;
            --global-fw: 800;
            --global-bw: 3.5px;
        }

        * {
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #eef2f5;
        }
        .hide-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .hide-scrollbar::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        
        .excel-cell {
            width: 160px;
            height: 80px;
            border: 1px solid #2c3e2f;
            background-color: #fffcf5;
            position: relative;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.05s linear;
            z-index: 10;
        }
        
        .excel-cell.has-data {
            border: var(--cell-bw, var(--global-bw)) solid #1e3a2f !important;
        }
        
        .text-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            text-align: center;
            z-index: 30;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            pointer-events: none;
        }
        .text-content strong { 
            font-size: var(--cell-fs, var(--global-fs)); 
            font-weight: var(--cell-fw, var(--global-fw)); 
            margin-bottom: 2px; 
            color: #0a2f1f; 
        }
        
        /* FIXED: Span text (2nd line) now scales proportionally with the strong text */
        .text-content span { 
            font-size: calc(var(--cell-fs, var(--global-fs)) * 0.85); 
            font-weight: calc(var(--cell-fw, var(--global-fw)) - 200); 
            color: #2d3e2b; 
        }
        
        .excel-row-header {
            border-bottom: 1px solid #2c3e2f;
            padding: 10px 8px;
            min-height: 44px;
            outline: none;
            background: #fef9e6;
            color: #000; 
            font-weight: 800; 
        }
        .excel-row-header:last-child { border-bottom: 2px solid #2c3e2f; }
        
        /* ---------------- PRINT STYLES ---------------- */
        @media print {
            @page { size: A4 landscape; margin: 10mm; } 
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .print\:hidden { display: none !important; }
            
            body, html {
                background: white !important; margin: 0 !important; padding: 0 !important;
                height: auto !important; overflow: visible !important;
            }
            .flex-1.overflow-auto, .hide-scrollbar {
                overflow: visible !important; height: auto !important; padding: 0 !important; background: white !important;
            }
            
            #canvas-wrapper { zoom: 1 !important; transform: none !important; display: block !important; width: 100% !important; height: auto !important; }
            #pages-wrapper { display: block !important; gap: 0 !important; }
            
            .page-container {
                display: block !important; 
                position: relative !important;
                page-break-inside: avoid !important; break-inside: avoid !important;
                page-break-after: always !important; break-after: page !important;
                border: 2px solid #000 !important; 
                margin: 0 !important; 
                padding: 20px !important;
                background: white !important; 
                box-shadow: none !important; 
                zoom: 0.55 !important; 
            }
            
            .page-container:last-child { page-break-after: auto !important; break-after: auto !important; }
            
            @-moz-document url-prefix() {
                .page-container {
                    zoom: 1 !important;
                    transform: scale(0.55) !important; transform-origin: top left !important;
                    width: 1580px !important; height: 1020px !important; margin-bottom: -450px !important; 
                }
            }
            svg { overflow: visible !important; }
        }
        /* ---------------------------------------------- */

        .excel-cell.selected-cell { outline: 3px solid #2c7da0; outline-offset: 1px; z-index: 40; }
        .excel-cell.link-start-highlight { outline: 3px solid #e67e22; outline-offset: 1px; z-index: 40; }
        .excel-cell.delete-mode-highlight { outline: 3px solid #ef4444; outline-offset: 1px; z-index: 40; }
        
        .symbol-bg { pointer-events: none; z-index: 25; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 1. TOP MENU BAR -->
    <div class="print:hidden w-full bg-[#1e293b] text-gray-200 flex items-center px-4 py-1.5 text-sm z-[60] shadow-md relative shrink-0">
        <!-- Hamburger Menu Button -->
        <button onclick="toggleSidebar()" class="mr-4 p-1 rounded hover:bg-slate-700 transition">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        
        <div class="font-extrabold text-white mr-6 tracking-wide text-lg">शजरा प्रो</div>

        <!-- Zoom Control -->
        <div class="ml-auto flex items-center gap-3">
            <span class="text-xs font-medium text-slate-300">ज़ूम:</span>
            <input type="range" id="zoom-slider" min="0.4" max="1.5" step="0.1" value="1" oninput="handleZoom(this.value)" class="w-24 cursor-pointer accent-emerald-500">
        </div>
    </div>

    <!-- SIDEBAR OVERLAY -->
    <div id="sidebar-overlay" class="print:hidden fixed inset-0 bg-black/50 z-[100] hidden" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR MENU -->
    <div id="sidebar" class="print:hidden fixed top-0 left-0 h-full w-72 bg-white shadow-2xl z-[110] transform -translate-x-full transition-transform duration-300 overflow-y-auto flex flex-col">
        <div class="flex items-center justify-between p-4 bg-[#1e293b] text-white shrink-0">
            <span class="font-extrabold tracking-wide text-lg">मेनू (Menu)</span>
            <button onclick="toggleSidebar()" class="hover:text-red-400 p-1">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        
        <div class="p-4 flex flex-col gap-6 flex-1">
            <!-- File Options -->
            <div>
                <h3 class="font-bold text-slate-500 border-b pb-1 mb-3 text-xs uppercase tracking-wide">फ़ाइल (File)</h3>
                <div class="flex flex-col gap-2">
                    <button onclick="document.getElementById('file-input').click()" class="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded border border-slate-200 text-sm font-medium flex justify-between items-center transition">
                        <span>आयात (Import)</span><span class="text-[10px] text-slate-400 font-mono">.json</span>
                    </button>
                    <button onclick="handleExport()" class="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded border border-slate-200 text-sm font-medium flex justify-between items-center transition">
                        <span>निर्यात (Export)</span><span class="text-[10px] text-slate-400 font-mono">.json</span>
                    </button>
                    <button onclick="window.print()" class="w-full text-left px-3 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-800 rounded border border-emerald-200 text-sm font-bold flex justify-between items-center transition mt-1">
                        <span>प्रिंट (Print)</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Details Options -->
            <div>
                <h3 class="font-bold text-slate-500 border-b pb-1 mb-3 text-xs uppercase tracking-wide">विवरण (Header Details)</h3>
                <div class="flex flex-col gap-2 text-sm font-medium">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">मौजा</span>
                        <input type="text" id="inp-mauja" class="w-40 border border-slate-300 rounded px-2 py-1 text-right bg-slate-50 focus:bg-white" oninput="updateHeaderData()">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">ह.नं.</span>
                        <input type="text" id="inp-hno" class="w-40 border border-slate-300 rounded px-2 py-1 text-right bg-slate-50 focus:bg-white" oninput="updateHeaderData()">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">तहसील</span>
                        <input type="text" id="inp-tehsil" class="w-40 border border-slate-300 rounded px-2 py-1 text-right bg-slate-50 focus:bg-white" oninput="updateHeaderData()">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">जिला</span>
                        <input type="text" id="inp-zila" class="w-40 border border-slate-300 rounded px-2 py-1 text-right bg-slate-50 focus:bg-white" oninput="updateHeaderData()">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">बाबत साल</span>
                        <input type="text" id="inp-saal" class="w-40 border border-slate-300 rounded px-2 py-1 text-right bg-slate-50 focus:bg-white" oninput="updateHeaderData()">
                    </div>
                </div>
            </div>

            <!-- Design Options -->
            <div>
                <h3 class="font-bold text-slate-500 border-b pb-1 mb-3 text-xs uppercase tracking-wide">डिज़ाइन (Design)</h3>
                
                <p class="text-xs font-bold text-slate-400 mb-2">सबके लिए (ALL BOXES)</p>
                <div class="flex flex-col gap-2 mb-4 text-sm font-medium bg-slate-50 p-2 rounded border border-slate-200">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">टेक्स्ट साइज़</span>
                        <input type="number" id="global-fs" value="13" class="w-20 border border-slate-300 rounded px-1 text-center bg-white" onchange="updateGlobalStyle('fontSize', this.value)">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">बोल्डनेस</span>
                        <input type="number" id="global-fw" step="100" min="100" max="900" value="800" class="w-20 border border-slate-300 rounded px-1 text-center bg-white" onchange="updateGlobalStyle('fontWeight', this.value)">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">बॉर्डर मोटाई</span>
                        <input type="number" id="global-bw" step="0.5" min="0" value="3.5" class="w-20 border border-slate-300 rounded px-1 text-center bg-white" onchange="updateGlobalStyle('borderWidth', this.value)">
                    </div>
                </div>

                <p class="text-xs font-bold text-blue-500 mb-2">चुने हुए बॉक्स के लिए (SELECTED BOX)</p>
                <div class="flex flex-col gap-2 text-sm font-medium bg-blue-50/50 p-2 rounded border border-blue-100">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">टेक्स्ट साइज़</span>
                        <input type="number" id="local-fs" placeholder="Auto" class="w-20 border border-slate-300 rounded px-1 text-center bg-white" onchange="updateLocalStyle('fontSize', this.value)">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">बोल्डनेस</span>
                        <input type="number" id="local-fw" step="100" min="100" max="900" placeholder="Auto" class="w-20 border border-slate-300 rounded px-1 text-center bg-white" onchange="updateLocalStyle('fontWeight', this.value)">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">बॉर्डर मोटाई</span>
                        <input type="number" id="local-bw" step="0.5" min="0" placeholder="Auto" class="w-20 border border-slate-300 rounded px-1 text-center bg-white" onchange="updateLocalStyle('borderWidth', this.value)">
                    </div>
                    <button onclick="clearLocalStyle()" class="mt-1 bg-white hover:bg-slate-100 text-slate-700 text-xs py-1.5 rounded border border-slate-300 font-bold transition">रिसेट (Reset Box)</button>
                </div>
            </div>

        </div>

        <!-- Page Delete Option at Bottom of Sidebar -->
        <div class="p-4 border-t border-slate-200 shrink-0">
            <button onclick="deleteCurrentPage()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 py-2 rounded text-sm font-bold flex justify-center items-center gap-2 transition">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                वर्तमान पेज हटाएं
            </button>
        </div>
    </div>

    <!-- Hidden File Input for Import -->
    <input type="file" id="file-input" onchange="handleImport(event)" class="hidden" accept=".json">

    <!-- 2. MAIN TOOLBAR (Tabs & Tools) -->
    <div class="print:hidden w-full bg-white border-b border-gray-300 z-50 p-2 shadow-sm flex flex-col gap-2 shrink-0">
        <div class="flex flex-wrap items-center justify-between gap-3">
            
            <!-- Tabs Area -->
            <div class="flex gap-1 overflow-x-auto hide-scrollbar pb-1 sm:pb-0" id="tabs-container"></div>
            
            <!-- Tools Area -->
            <div class="flex flex-wrap items-center gap-2">
                <div id="mic-container" class="flex items-center justify-center gap-1.5 px-2 py-1.5 border border-slate-300 bg-slate-50 hover:bg-slate-100 rounded cursor-pointer transition shrink-0" title="बॉक्स चुनें और बोलें">
                    <svg id="mic-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-600">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span id="mic-text" class="text-xs font-bold text-slate-600 hidden sm:inline">बोलें</span>
                </div>

                <textarea id="manual-name" rows="1" class="w-40 sm:w-56 border border-slate-400 px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded bg-white resize-none leading-tight" placeholder="नाम लिखें (Enter से सेव)" style="height: 32px;"></textarea>
                
                <button onclick="handleManualEntry()" class="bg-blue-600 text-white px-3 py-1.5 text-xs font-bold hover:bg-blue-700 transition rounded shadow-sm">सेव</button>
                
                <div class="w-px h-6 bg-slate-300 mx-0.5"></div>
                
                <button onclick="setEntryType('male')" class="bg-white border border-slate-400 px-2.5 py-1.5 text-xs font-bold text-slate-800 hover:bg-slate-100 transition rounded">पुरुष</button>
                <button onclick="setEntryType('female')" class="bg-white border border-slate-400 px-2.5 py-1.5 text-xs font-bold text-pink-600 hover:bg-pink-50 transition rounded">बेटी (△)</button>
                <button onclick="setEntryType('wife')" class="bg-white border border-slate-400 px-2.5 py-1.5 text-xs font-bold text-rose-700 hover:bg-rose-50 transition rounded">पत्नी (♡)</button>
                
                <div class="w-px h-6 bg-slate-300 mx-0.5"></div>
                
                <button id="btn-link-mode" onclick="toggleLinkMode()" class="bg-slate-800 text-white px-3 py-1.5 text-xs font-bold hover:bg-black transition rounded">लाइन जोड़ें</button>
                <button id="btn-delete-link-mode" onclick="toggleDeleteLinkMode()" class="bg-white border border-red-400 text-red-600 px-3 py-1.5 text-xs font-bold hover:bg-red-50 transition rounded">लाइन हटाएं</button>
                <button onclick="deleteSelectedCell()" class="bg-red-50 text-red-700 border border-red-300 px-3 py-1.5 text-xs font-bold hover:bg-red-100 transition rounded" title="चुना हुआ बॉक्स मिटाएं">मिटाएं</button>
            </div>
        </div>
    </div>

    <!-- MAIN CANVAS WRAPPER -->
    <div class="flex-1 w-full overflow-auto bg-gray-100 p-4 hide-scrollbar relative" id="canvas-scroll-area">
        <div id="canvas-wrapper" class="origin-top-left inline-block" style="zoom: 1;">
            <div id="pages-wrapper" class="flex flex-col gap-8"></div>
        </div>
    </div>

    <script>
        const COL_W = 160, ROW_H = 80, GAP_X = 40, GAP_Y = 60, COLS = 7, ROWS = 7;
        const WIFE_LEFT_EDGE = 25, WIFE_RIGHT_EDGE = 150;   
        
        let state = {
            globalStyle: { fontSize: 13, fontWeight: 800, borderWidth: 3.5 },
            headerData: { mauja: '', hNo: '', tehsil: '', zila: '', saal: '' },
            pages: {},
            activePage: "page-0",
            links: [],
            selectedPos: '0-0',
            isLinkMode: false,
            isDeleteLinkMode: false,
            linkStart: null,
            isListening: false
        };

        window.onload = () => {
            applyGlobalStyles();
            addPage("page-0");
            document.getElementById('manual-name').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleManualEntry(); }
            });
            renderTabs();
            updateSelectionUI();
            renderAllHeaders();
        };

        // SIDEBAR TOGGLE
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // HEADER DATA MANAGEMENT
        function updateHeaderData() {
            state.headerData.mauja = document.getElementById('inp-mauja').value;
            state.headerData.hNo = document.getElementById('inp-hno').value;
            state.headerData.tehsil = document.getElementById('inp-tehsil').value;
            state.headerData.zila = document.getElementById('inp-zila').value;
            state.headerData.saal = document.getElementById('inp-saal').value;
            renderAllHeaders();
        }

        function renderAllHeaders() {
            const { mauja, hNo, tehsil, zila, saal } = state.headerData;
            const headerText = `शजरा नस्ब मालकान &nbsp;&nbsp;&nbsp; मौजा - ${mauja || '________'} &nbsp;&nbsp;&nbsp; ह.नं. ${hNo || '______'} &nbsp;&nbsp;&nbsp; तहसील - ${tehsil || '________'} &nbsp;&nbsp;&nbsp; जिला - ${zila || '________'} &nbsp;&nbsp;&nbsp; बाबत साल - ${saal || '______'}`;
            
            Object.keys(state.pages).forEach(pId => {
                const el = document.getElementById(`dynamic-header-${pId}`);
                if (el) el.innerHTML = headerText;
            });
        }

        // STYLE MANAGEMENT FUNCTIONS
        function updateGlobalStyle(prop, val) {
            state.globalStyle[prop] = parseFloat(val) || val;
            applyGlobalStyles();
        }

        function applyGlobalStyles() {
            if (!state.globalStyle) state.globalStyle = { fontSize: 13, fontWeight: 800, borderWidth: 3.5 };
            const root = document.documentElement;
            root.style.setProperty('--global-fs', `${state.globalStyle.fontSize}px`);
            root.style.setProperty('--global-fw', state.globalStyle.fontWeight);
            root.style.setProperty('--global-bw', `${state.globalStyle.borderWidth}px`);
            
            document.getElementById('global-fs').value = state.globalStyle.fontSize;
            document.getElementById('global-fw').value = state.globalStyle.fontWeight;
            document.getElementById('global-bw').value = state.globalStyle.borderWidth;
        }

        function updateLocalStyle(prop, val) {
            if (!state.selectedPos || !state.pages[state.activePage][state.selectedPos]) return;
            const data = state.pages[state.activePage][state.selectedPos];
            
            if (!data.style) data.style = {};
            if (val === '' || isNaN(val)) {
                delete data.style[prop];
            } else {
                data.style[prop] = parseFloat(val);
            }
            renderCell(state.activePage, state.selectedPos);
        }

        function clearLocalStyle() {
            if (!state.selectedPos) return;
            const data = state.pages[state.activePage][state.selectedPos];
            if (data && data.style) {
                delete data.style;
                renderCell(state.activePage, state.selectedPos);
                updateSelectionUI(); 
            }
        }

        function handleZoom(val) { 
            document.getElementById('canvas-wrapper').style.zoom = val; 
        }

        function addPage(pId) {
            if (!state.pages[pId]) state.pages[pId] = {};
            const wrapper = document.getElementById('pages-wrapper');
            const pageDiv = document.createElement('div');
            pageDiv.id = pId;
            pageDiv.className = "page-container bg-white shadow-xl border border-gray-400 p-10 min-w-[1580px] min-h-[1020px] rounded-sm";
            
            pageDiv.innerHTML = `
                <div class="mb-8 w-full border-t-2 border-x-2 border-black z-20 relative bg-[#fef7e0]">
                    <div id="dynamic-header-${pId}" class="excel-row-header text-center text-xl font-extrabold text-black tracking-wide"></div>
                    <div contenteditable="true" class="excel-row-header text-center text-lg font-bold text-black">&nbsp;</div>
                    <div contenteditable="true" class="excel-row-header text-center text-lg font-bold text-black">&nbsp;</div>
                </div>
                
                <div class="flex justify-center w-full my-8">
                    <div id="grid-container-${pId}" class="relative inline-block text-left">
                        <svg id="svg-${pId}" class="absolute inset-0 w-full h-full pointer-events-none overflow-visible" style="z-index: 5;"></svg>
                        <div id="grid-${pId}" class="grid grid-cols-7 gap-x-[40px] gap-y-[60px] relative z-10"></div>
                    </div>
                </div>
                
                <div class="mt-12 w-full border-t-2 border-x-2 border-black z-20 relative bg-[#fef7e0]">
                    <div contenteditable="true" class="excel-row-header text-right font-bold text-lg text-black">&nbsp;</div>
                    <div contenteditable="true" class="excel-row-header text-right font-bold text-lg text-black">&nbsp;</div>
                </div>
            `;
            wrapper.appendChild(pageDiv);
            renderAllHeaders();

            const grid = document.getElementById(`grid-${pId}`);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const pos = `${r}-${c}`;
                    const cellDiv = document.createElement('div');
                    cellDiv.id = `cell-${pId}-${pos}`;
                    cellDiv.className = "excel-cell";
                    cellDiv.onclick = () => handleCellClick(pId, r, c);
                    grid.appendChild(cellDiv);
                }
            }
            switchPage(pId);
        }

        // DELETE CURRENT PAGE FUNCTION
        function deleteCurrentPage() {
            const pageIds = Object.keys(state.pages);
            if (pageIds.length <= 1) {
                alert("अंतिम पेज को नहीं हटाया जा सकता। (Cannot delete the last page)");
                return;
            }
            if (!confirm("क्या आप वाकई इस पेज को हटाना चाहते हैं?")) return;
            
            const pId = state.activePage;
            
            // Remove links associated with this page
            state.links = state.links.filter(l => l.from.page !== pId && l.to.page !== pId);
            
            // Remove page from state
            delete state.pages[pId];
            
            // Remove from DOM
            const pageEl = document.getElementById(pId);
            if(pageEl) pageEl.remove();
            
            // Close sidebar and switch to another page
            toggleSidebar();
            const remainingPages = Object.keys(state.pages);
            switchPage(remainingPages[0]);
        }

        function switchPage(pId) {
            state.activePage = pId;
            document.querySelectorAll('.page-container').forEach(p => p.style.display = (p.id === pId ? "block" : "none"));
            renderTabs();
            updateSelectionUI();
            calculateLines();
            document.getElementById('canvas-scroll-area').scrollTo(0,0);
        }

        function renderCell(pId, pos) {
            const cell = document.getElementById(`cell-${pId}-${pos}`);
            const data = state.pages[pId][pos];
            if (!cell) return;
            cell.innerHTML = '';
            
            const hasContent = data && data.name && data.name.trim().length > 0;
            if (hasContent) cell.classList.add('has-data');
            else cell.classList.remove('has-data');
            
            if (data && (data.type === 'wife' || data.type === 'female')) cell.style.backgroundColor = 'transparent';
            else if (hasContent) cell.style.backgroundColor = '#fffef7';
            else cell.style.backgroundColor = '#fffcf5';
            
            if (data && data.style) {
                if (data.style.borderWidth !== undefined) cell.style.setProperty('--cell-bw', `${data.style.borderWidth}px`);
                else cell.style.removeProperty('--cell-bw');
                
                if (data.style.fontSize !== undefined) cell.style.setProperty('--cell-fs', `${data.style.fontSize}px`);
                else cell.style.removeProperty('--cell-fs');
                
                if (data.style.fontWeight !== undefined) cell.style.setProperty('--cell-fw', data.style.fontWeight);
                else cell.style.removeProperty('--cell-fw');
            } else {
                cell.style.removeProperty('--cell-bw');
                cell.style.removeProperty('--cell-fs');
                cell.style.removeProperty('--cell-fw');
            }

            if (!data) return;
            const lines = data.name.split('\n');
            const textHtml = `<strong>${escapeHtml(lines[0])}</strong>${lines.slice(1).map(l => `<span>${escapeHtml(l)}</span>`).join('')}`;
            
            if (data.type === 'female') {
                cell.insertAdjacentHTML('beforeend', `<svg class="absolute inset-0 w-full h-full symbol-bg" viewBox="0 0 160 80"><polygon points="80,0 70,15 90,15" fill="white" stroke="#1e3a2f" stroke-width="1.8"/></svg>`);
                cell.insertAdjacentHTML('beforeend', `<div class="text-content absolute inset-0 pt-[14px]">${textHtml}</div>`);
            } else if (data.type === 'wife') {
                cell.insertAdjacentHTML('beforeend', `<svg class="absolute inset-0 w-full h-full symbol-bg" viewBox="0 0 160 80"><path d="M 25 40 C 5 -5, 80 -5, 150 40 C 80 85, 5 85, 25 40 Z" fill="#fff4f0" stroke="#7a2e2e" stroke-width="2"/></svg>`);
                cell.insertAdjacentHTML('beforeend', `<div class="text-content absolute inset-0" style="padding-left: 32px; padding-right: 15px;">${textHtml}</div>`);
            } else {
                cell.insertAdjacentHTML('beforeend', `<div class="text-content absolute inset-0">${textHtml}</div>`);
            }
        }
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        function getCoords(pos) {
            const [r, c] = pos.split('-').map(Number);
            const x = c * (COL_W + GAP_X), y = r * (ROW_H + GAP_Y);
            return { x, y, cx: x + 80, cy: y + 40, top: y, bottom: y + ROW_H, right: x + COL_W, left: x };
        }

        function calculateLines() {
            Object.keys(state.pages).forEach(p => { const s = document.getElementById(`svg-${p}`); if (s) s.innerHTML = ''; });
            const totalGridWidth = (COLS * COL_W) + ((COLS-1) * GAP_X);
            
            state.links.forEach(link => {
                const fP = link.from.page, tP = link.to.page, fPo = link.from.pos, tPo = link.to.pos;
                const fD = state.pages[fP]?.[fPo], tD = state.pages[tP]?.[tPo];
                const c1 = getCoords(fPo), c2 = getCoords(tPo);
                const isSameRow = Math.abs(c1.y - c2.y) < 10;

                if (isSameRow) {
                    if (fP === tP) {
                        const svg = document.getElementById(`svg-${fP}`); if (!svg) return;
                        let sX = c1.cx < c2.cx ? c1.right : c2.right;
                        let eX = c1.cx < c2.cx ? c2.left : c1.left;
                        const lD = c1.cx < c2.cx ? fD : tD, rD = c1.cx < c2.cx ? tD : fD;
                        if (rD?.type === 'wife') eX += WIFE_LEFT_EDGE;
                        if (lD?.type === 'wife') sX = (c1.cx < c2.cx ? c1.left : c2.left) + WIFE_RIGHT_EDGE;
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M ${sX} ${c1.cy} L ${eX} ${c1.cy}`);
                        path.setAttribute('stroke', '#1e293b'); path.setAttribute('stroke-width', '2.5'); path.setAttribute('fill', 'none');
                        svg.appendChild(path);
                    } else {
                        const sF = document.getElementById(`svg-${fP}`), sT = document.getElementById(`svg-${tP}`);
                        if (sF) {
                            let sX = fD?.type === 'wife' ? c1.left + WIFE_RIGHT_EDGE : c1.right;
                            const p1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            p1.setAttribute('d', `M ${sX} ${c1.cy} L ${totalGridWidth + 50} ${c1.cy}`);
                            p1.setAttribute('stroke', '#1e293b'); p1.setAttribute('stroke-width', '2.5'); sF.appendChild(p1);
                        }
                        if (sT) {
                            let eX = tD?.type === 'wife' ? c2.left + WIFE_LEFT_EDGE : c2.left;
                            const p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            p2.setAttribute('d', `M -40 ${c2.cy} L ${eX} ${c2.cy}`);
                            p2.setAttribute('stroke', '#1e293b'); p2.setAttribute('stroke-width', '2.5'); sT.appendChild(p2);
                        }
                    }
                } else {
                    const mY = c1.bottom + (GAP_Y / 2), sF = document.getElementById(`svg-${fP}`);
                    if (sF) {
                        let d1 = `M ${c1.cx} ${c1.bottom} L ${c1.cx} ${mY}`;
                        d1 += (fP === tP) ? ` L ${c2.cx} ${mY} L ${c2.cx} ${c2.top}` : ` L ${totalGridWidth + 50} ${mY}`;
                        const p1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        p1.setAttribute('d', d1); p1.setAttribute('stroke', '#1e293b'); p1.setAttribute('stroke-width', '2'); p1.setAttribute('fill', 'none');
                        sF.appendChild(p1);
                    }
                    if (fP !== tP) {
                        const sT = document.getElementById(`svg-${tP}`);
                        if (sT) {
                            const p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            p2.setAttribute('d', `M -40 ${mY} L ${c2.cx} ${mY} L ${c2.cx} ${c2.top}`);
                            p2.setAttribute('stroke', '#1e293b'); p2.setAttribute('stroke-width', '2'); p2.setAttribute('fill', 'none');
                            sT.appendChild(p2);
                        }
                    }
                }
            });
        }

        function handleCellClick(pId, r, c) {
            const pos = `${r}-${c}`;
            if (state.isDeleteLinkMode) {
                state.links = state.links.filter(l => 
                    !(l.from.page === pId && l.from.pos === pos) && 
                    !(l.to.page === pId && l.to.pos === pos)
                );
                calculateLines();
                return;
            }
            if (state.isLinkMode) {
                if (!state.linkStart) { state.linkStart = { page: pId, pos: pos }; updateSelectionUI(); }
                else {
                    if (state.linkStart.page === pId && state.linkStart.pos === pos) { state.linkStart = null; updateSelectionUI(); return; }
                    state.links.push({ from: state.linkStart, to: { page: pId, pos: pos } });
                    state.linkStart = null; calculateLines(); updateSelectionUI();
                }
            } else {
                state.selectedPos = pos;
                if (state.activePage !== pId) switchPage(pId);
                const data = state.pages[pId][pos];
                document.getElementById('manual-name').value = data ? data.name : '';
                if (!data || !data.name) triggerVoiceForCell(pId, pos);
                updateSelectionUI();
            }
        }
        
        function triggerVoiceForCell(pId, pos) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            const rec = new SR(); rec.lang = 'hi-IN'; state.isListening = true; updateListeningUI();
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                state.pages[pId][pos] = { ...(state.pages[pId][pos] || {type:'male'}), name: text };
                document.getElementById('manual-name').value = text;
                renderCell(pId, pos); calculateLines();
            };
            rec.onend = () => { state.isListening = false; updateListeningUI(); };
            rec.start();
        }
        
        function updateListeningUI() {
            const c = document.getElementById('mic-container'), t = document.getElementById('mic-text');
            if (state.isListening) { c.className = "flex items-center gap-1.5 px-2 py-1.5 border border-red-400 bg-red-100 rounded shrink-0"; t.textContent = 'सुन रहा हूँ...'; t.className="text-xs font-bold text-red-700 hidden sm:inline"; }
            else { c.className = "flex items-center gap-1.5 px-2 py-1.5 border border-slate-300 bg-slate-50 hover:bg-slate-100 rounded cursor-pointer transition shrink-0"; t.textContent = 'बोलें'; t.className="text-xs font-bold text-slate-600 hidden sm:inline"; }
        }
        
        function updateSelectionUI() {
            document.querySelectorAll('.excel-cell').forEach(el => el.classList.remove('selected-cell', 'link-start-highlight', 'delete-mode-highlight'));
            const sel = document.getElementById(`cell-${state.activePage}-${state.selectedPos}`);
            if (sel) sel.classList.add(state.isDeleteLinkMode ? 'delete-mode-highlight' : 'selected-cell');
            if (state.linkStart) {
                const start = document.getElementById(`cell-${state.linkStart.page}-${state.linkStart.pos}`);
                if (start) start.classList.add('link-start-highlight');
            }

            const data = state.pages[state.activePage][state.selectedPos];
            if (data && data.style) {
                document.getElementById('local-fs').value = data.style.fontSize || '';
                document.getElementById('local-fw').value = data.style.fontWeight || '';
                document.getElementById('local-bw').value = data.style.borderWidth || '';
            } else {
                document.getElementById('local-fs').value = '';
                document.getElementById('local-fw').value = '';
                document.getElementById('local-bw').value = '';
            }
        }
        
        function handleManualEntry() {
            const name = document.getElementById('manual-name').value.trim();
            if (!name) return;
            state.pages[state.activePage][state.selectedPos] = { ...(state.pages[state.activePage][state.selectedPos] || {type:'male'}), name: name };
            renderCell(state.activePage, state.selectedPos); calculateLines();
        }
        
        function setEntryType(t) {
            state.pages[state.activePage][state.selectedPos] = { ...(state.pages[state.activePage][state.selectedPos] || {name:''}), type: t };
            renderCell(state.activePage, state.selectedPos); calculateLines();
        }
        
        function toggleLinkMode() {
            state.isLinkMode = !state.isLinkMode; state.isDeleteLinkMode = false; state.linkStart = null;
            const btn = document.getElementById('btn-link-mode'), btnD = document.getElementById('btn-delete-link-mode');
            btn.className = state.isLinkMode ? "bg-orange-600 text-white px-3 py-1.5 text-xs font-bold rounded shadow transition" : "bg-slate-800 text-white px-3 py-1.5 text-xs font-bold hover:bg-black rounded transition";
            btnD.className = "bg-white border border-red-400 text-red-600 px-3 py-1.5 text-xs font-bold hover:bg-red-50 rounded transition";
            updateSelectionUI();
        }

        function toggleDeleteLinkMode() {
            state.isDeleteLinkMode = !state.isDeleteLinkMode; state.isLinkMode = false; state.linkStart = null;
            const btn = document.getElementById('btn-link-mode'), btnD = document.getElementById('btn-delete-link-mode');
            btnD.className = state.isDeleteLinkMode ? "bg-red-600 text-white px-3 py-1.5 text-xs font-bold rounded shadow transition" : "bg-white border border-red-400 text-red-600 px-3 py-1.5 text-xs font-bold hover:bg-red-50 rounded transition";
            btn.className = "bg-slate-800 text-white px-3 py-1.5 text-xs font-bold hover:bg-black rounded transition";
            updateSelectionUI();
        }
        
        function deleteSelectedCell() {
            delete state.pages[state.activePage][state.selectedPos];
            state.links = state.links.filter(l => !(l.from.page === state.activePage && l.from.pos === state.selectedPos) && !(l.to.page === state.activePage && l.to.pos === state.selectedPos));
            renderCell(state.activePage, state.selectedPos); calculateLines(); document.getElementById('manual-name').value = '';
        }
        
        function renderTabs() {
            const container = document.getElementById('tabs-container'); container.innerHTML = '';
            Object.keys(state.pages).forEach((p, idx) => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1.5 border text-xs font-bold rounded transition ${state.activePage === p ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'}`;
                btn.textContent = `पेज ${idx+1}`; btn.onclick = () => switchPage(p); container.appendChild(btn);
            });
            const addBtn = document.createElement('button'); addBtn.textContent = "+ नया पेज"; addBtn.className = "px-3 py-1.5 border border-emerald-400 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 text-xs font-bold rounded transition shrink-0";
            addBtn.onclick = () => addPage(`page-${Object.keys(state.pages).length}`); container.appendChild(addBtn);
        }
        
        function handleExport() {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(state)], {type:'application/json'}));
            a.download = 'Shajra_Pro_Data.json'; a.click();
        }
        
        function handleImport(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = (ev) => {
                try {
                    state = JSON.parse(ev.target.result); 
                    if (!state.globalStyle) state.globalStyle = { fontSize: 13, fontWeight: 800, borderWidth: 3.5 };
                    if (!state.headerData) state.headerData = { mauja: '', hNo: '', tehsil: '', zila: '', saal: '' };
                    
                    applyGlobalStyles();
                    
                    document.getElementById('inp-mauja').value = state.headerData.mauja || '';
                    document.getElementById('inp-hno').value = state.headerData.hNo || '';
                    document.getElementById('inp-tehsil').value = state.headerData.tehsil || '';
                    document.getElementById('inp-zila').value = state.headerData.zila || '';
                    document.getElementById('inp-saal').value = state.headerData.saal || '';

                    document.getElementById('pages-wrapper').innerHTML = '';
                    Object.keys(state.pages).forEach(p => { addPage(p); Object.keys(state.pages[p]).forEach(pos => renderCell(p, pos)); });
                    if (Object.keys(state.pages).length) switchPage(Object.keys(state.pages)[0]);
                    
                    calculateLines();
                    renderAllHeaders();
                    toggleSidebar(); // Close sidebar after import
                } catch(err) { alert("अमान्य फ़ाइल"); }
            }; reader.readAsText(file); e.target.value = '';
        }
    </script>
</body>
